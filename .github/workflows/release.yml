name: Release

on:
  push:
    tags:
      - "V*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            platform: windows-latest
            args: ""
            rust_targets: ""
          - label: Linux x64
            platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - label: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
          - label: macOS Intel
            platform: macos-15-intel
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install macOS DMG dependencies
        if: startsWith(matrix.platform, 'macos-')
        run: brew install create-dmg || brew upgrade create-dmg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Desktop Pet Launcher ${{ github.ref_name }}
          releaseBody: |
            Desktop Pet Launcher automated build for ${{ github.ref_name }}.

            Download the installer for your operating system from the assets below.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
